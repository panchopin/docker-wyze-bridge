name: Docker Wyze Bridge (panchopin fork)
description: WebRTC/RTSP/RTMP/LL-HLS bridge for Wyze cameras with Home Assistant support and a native go2rtc sidecar.
slug: docker_wyze_bridge_v4_panchopin
url: https://github.com/panchopin/docker-wyze-bridge
version: 4.3.9
stage: stable
image: ghcr.io/panchopin/docker-wyze-bridge
arch:
  - armv7
  - aarch64
  - amd64
startup: application
boot: auto
apparmor: false
hassio_api: true
host_network: true
ports:
  58554/tcp: 58554
  39888/tcp: 39888
  58889/tcp: 58889
  59997/tcp: 59997
  5000/tcp: 5000
  19554/tcp: 19554
ports_description:
  58554/tcp: RTSP (WebRTC-backed) rtsp://localhost:58554/camera-name
  39888/tcp: HLS http://localhost:39888/camera-name/stream.m3u8
  58889/tcp: WebRTC/WHEP http://localhost:58889/camera-name
  59997/tcp: MediaMTX API
  5000/tcp: Web UI http://localhost:5000
  19554/tcp: go2rtc RTSP rtsp://localhost:19554/camera-name
map:
  - addon_config:rw
  - media:rw
  - ssl:ro
services:
  - mqtt:want
video: true
ingress: true
ingress_port: 5000
panel_icon: mdi:bridge
watchdog: http://[HOST]:[PORT:5000]/health
options:
  WYZE_EMAIL: ""
  WYZE_PASSWORD: ""
  API_ID: ""
  API_KEY: ""
  ENABLE_AUDIO: true
  ON_DEMAND: true
  SD_ONLY: false
  MOTION_API: true
  CAM_OPTIONS: []
  GO2RTC_LAN_IP_OVERRIDES: ""
  GO2RTC_FORCE_LAN_IP_OVERRIDES: false
  CONNECT_TIMEOUT: 60
  CONNECT_RETRIES: 3
  CONNECT_RETRY_DELAY: 2.0
  WHEP_DEBUG: false
  WHEP_TRACE_STREAM: ""
schema:
  WYZE_EMAIL: email
  WYZE_PASSWORD: password
  API_ID: match([a-fA-F0-9-]{36})
  API_KEY: match([a-zA-Z0-9]{60})
  TOTP_KEY: str?
  ON_DEMAND: bool?
  SD_ONLY: bool?
  ENABLE_AUDIO: bool?
  SUBSTREAM: bool?
  NET_MODE: list(LAN|P2P|ANY)?
  FORCE_FPS: int?
  CAM_OPTIONS:
    - CAM_NAME: str?
      HD: bool?
      SD: bool?
      AUDIO: bool?
      STREAM: list(main|both|sub)?
      FORCE_FPS: int?
      RECORD: bool?
      SUB_RECORD: bool?
      SUBSTREAM: bool?
      NET_MODE: str?
      ROTATE: bool?
      LIVESTREAM: str?
      MOTION_WEBHOOKS: str?
      FFMPEG: str?
  WB_AUTH: bool?
  WB_USERNAME: str?
  WB_PASSWORD: str?
  STREAM_AUTH: str?
  MOTION_API: bool?
  MOTION_INT: float(1.1,)?
  MOTION_START: bool?
  MOTION_WEBHOOKS: str?
  SNAPSHOT: list(API|RTSP|RTSP15|RTSP30|RTSP60|RTSP180|RTSP300|Disable)?
  SNAPSHOT_FORMAT: str?
  SNAPSHOT_KEEP: str?
  IMG_TYPE: list(jpg|png)?
  IMG_DIR: str?
  RECORD_ALL: bool?
  SUB_RECORD: bool?
  RECORD_KEEP: str?
  RECORD_LENGTH: str?
  RECORD_PATH: str?
  RECORD_FILE_NAME: str?
  MQTT: bool?
  MQTT_HOST: str?
  MQTT_AUTH: str?
  MQTT_TOPIC: str?
  MQTT_DTOPIC: str?
  MQTT_RETRIES: int?
  FILTER_NAMES: str?
  FILTER_MODELS: str?
  FILTER_MACS: str?
  FILTER_BLOCK: bool?
  AUDIO_CODEC: list(COPY|AAC|LIBOPUS|MP3|PCM_MULAW|PCM_ALAW)?
  ROTATE_DOOR: bool?
  H264_ENC: str?
  FORCE_ENCODE: bool?
  WB_IP: str?
  GO2RTC_LAN_IP_OVERRIDES: str?
  GO2RTC_FORCE_LAN_IP_OVERRIDES: bool?
  STUN_SERVER: str?
  DOMAIN: str?
  CONNECT_TIMEOUT: int?
  CONNECT_RETRIES: int?
  CONNECT_RETRY_DELAY: float?
  WHEP_DEBUG: bool?
  WHEP_TRACE_STREAM: str?
  IGNORE_OFFLINE: bool?
  OFFLINE_TIME: int?
  LOG_LEVEL: list(FATAL|ERROR|WARNING|INFO|DEBUG)?
  LOG_FILE: bool?
  LOG_TIME: bool?
  FFMPEG_LOGLEVEL: list(quiet|panic|fatal|error|warning|info|verbose|debug)?
  FRESH_DATA: bool?
  LLHLS: bool?
  DISABLE_CONTROL: bool?
  RTSP_FW: bool?
  URI_SEPARATOR: list(-|_|#)?
